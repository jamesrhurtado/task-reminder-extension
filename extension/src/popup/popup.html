<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="tab-container">
    <button class="tab-btn active" data-tab="task">Lock In</button>
    <button class="tab-btn" data-tab="domains">Auto-Prompt Sites</button>
  </div>

  <div id="taskTab" class="tab-content active">
    <h3>What are you locked in for?</h3>
    <input id="taskInput" placeholder="e.g. Check Marketplace item" />
    
    <div class="time-section">
      <label>Time Limit (optional)</label>
      <div class="time-presets">
        <button class="time-preset-btn" data-minutes="5">5 min</button>
        <button class="time-preset-btn" data-minutes="15">15 min</button>
        <button class="time-preset-btn" data-minutes="30">30 min</button>
        <button class="time-preset-btn" id="customTimeBtn">Custom</button>
      </div>
      <input type="number" id="customTimeInput" placeholder="Minutes" min="1" max="480" style="display: none;" />
      <div class="selected-time" id="selectedTime"></div>
    </div>
    
    <button id="saveBtn">Lock In</button>
  </div>

  <div id="domainsTab" class="tab-content">
    <h3>Auto-Prompt Domains</h3>
    <p class="helper-text">Sites that will automatically ask what you're locked in for</p>

    <div class="add-domain-section">
      <input id="domainInput" placeholder="e.g. linkedin.com" />
      <button id="addDomainBtn">Add</button>
    </div>

    <ul id="domainsList"></ul>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
